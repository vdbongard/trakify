@if (showErrorTemplate() ? loadingState() !== 'error' : true) {
  @if (!spinnerVisible() || !showLoading()) {
    <ng-content />
  } @else {
    <ng-container *ngTemplateOutlet="customLoading() ?? loading" />
  }
} @else {
  <ng-container *ngTemplateOutlet="customError() ?? error" />
}

<ng-template #loading>
  <div class="loading-wrapper">
    <mat-spinner [diameter]="32" class="tertiary-spinner" />
  </div>
</ng-template>
<ng-template #error>
  <p class="mat-body-medium">An error occurred.</p>
</ng-template>
