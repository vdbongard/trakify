<!-- prevent a flash of episode count when marking next episode as seen optimistically -->
@if (showProgress()?.next_episode !== undefined) {
  @let remaining = remainingEpisodesCount();
  @if (remaining >= 0) {
    @if (withDividerLeft()) {
      {{ Divider }}
    }
    @if (remaining > 0) {
      {{ remaining }} remaining
    } @else {
      {{ episodes() }} episodes
    }
    @if (withDividerRight()) {
      {{ Divider }}
    }
  }
}
